<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>

</head>

<body>
    <form action="backend.php" method="POST">
        <h1>Forms in HTML</h1>
        <label for="name">Name:</label>
        <input type="name" id="name" name="name"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        <label for="Gender">Gender</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label><br><br>

        <label for="Hobbies">Hobbies</label>
        <input type="checkbox" id="hobby1" name="hobby1" value="Reading">
        <label for="hobby1">Reading</label>
        <input type="checkbox" id="hobby2" name="hobby2" value="Writing">
        <label for="hobby2">Writing</label>
        <input type="checkbox" id="hobby3" name="hobby3" value="Coding">
        <label for="hobby3">Coding</label><br><br>

        <input type="button" value="Submit"> <input type="reset" value="Reset">


    </form>

</body>

</html>
