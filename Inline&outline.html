    This is a block lavel element. It starts on a new line and takes up the full width availanle. It can contain otner
    block level elements and inline elements.

    <p>This is a paragraph.</p>
    <p>This is also a paragraph.</p>

    <!-- 1. Block Elements kya hote hain?

👉 Ye poori line (width) le lete hain
👉 Hamesha new line se start hote hain -->

    <span>This is also an inline element.</span>

    <!-- 🟩 2. Inline Elements kya hote hain?

👉 Ye sirf jitni jagah chahiye utni lete hain
